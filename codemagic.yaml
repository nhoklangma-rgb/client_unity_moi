# File cấu hình Codemagic tối ưu để đóng gói Xcode Project có sẵn thành file .ipa (Chạy siêu tốc trên Cloud, không cần Unity Editor)

workflows:
  unity-ios-build:
    name: Xcode iOS Pack Workflow
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Ghép các file thư viện lớn (Merge split library files)
        script: |
          # Ghép lại file thư viện lõi của Unity theo đúng thứ tự số học (0, 1, 2, 3, 4)
          cd ios_build/Libraries
          rm -f libiPhone-lib.a
          for i in {0..4}; do cat libiPhone-lib.a.part$i >> libiPhone-lib.a; done
          rm libiPhone-lib.a.part*
          
          # Ghép lại file thư viện Vivox theo đúng thứ tự số học (0 đến 18)
          cd com.unity.services.vivox/Plugins/iOS
          rm -f libvivoxsdk.a
          for i in {0..18}; do cat libvivoxsdk.a.part$i >> libvivoxsdk.a; done
          rm libvivoxsdk.a.part*
      - name: Biên dịch Xcode không cần Chứng chỉ Apple (Build Xcode Unsigned)
        script: |
          cd ios_build
          
          # Thực hiện compile dự án Xcode và tắt tính năng yêu cầu chứng chỉ ký app của Apple
          xcodebuild -project Unity-iPhone.xcodeproj \
                     -scheme Unity-iPhone \
                     -configuration Release \
                     -sdk iphoneos \
                     CONFIGURATION_BUILD_DIR=../build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     clean build
      - name: Đóng gói thư mục .app thành file .ipa chạy thử (Package IPA)
        script: |
          # Tạo cấu trúc thư mục IPA tiêu chuẩn (Payload/)
          mkdir -p Payload
          cp -r build/Unity-iPhone.app Payload/
          
          # Nén Payload thành file .ipa chạy thử cho Sideloadly
          zip -r HaiTacMuRom_Unsigned.ipa Payload
    artifacts:
      - "*.ipa"
    publishing:
      email:
        recipients:
          - nhoklangma@gmail.com # Tự động gửi link tải file .ipa về email đăng ký của bạn
        notify:
          success: true
          failure: true
