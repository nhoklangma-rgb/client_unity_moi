# File cấu hình Codemagic tối ưu để đóng gói Xcode Project có sẵn thành file .ipa (Chạy siêu tốc trên Cloud, không cần Unity Editor)

workflows:
  unity-ios-build:
    name: Xcode iOS Pack Workflow
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Ghép các file thư viện lớn (Merge split library files)
        script: |
          # Ghép lại file thư viện lõi của Unity
          cd ios_build/Libraries
          cat libiPhone-lib.a.part* > libiPhone-lib.a
          rm libiPhone-lib.a.part*
          
          # Ghép lại file thư viện Vivox
          cd com.unity.services.vivox/Plugins/iOS
          cat libvivoxsdk.a.part* > libvivoxsdk.a
          rm libvivoxsdk.a.part*
      - name: Đóng gói dự án Xcode sang file .ipa (Xcode Archive & Export)
        script: |
          cd ios_build
          
          # Thực hiện build dự án Xcode thành file .ipa thành phẩm
          xcode-project build-ipa --project Unity-iPhone.xcodeproj --scheme Unity-iPhone
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - nhoklangma@gmail.com # Tự động gửi link tải file .ipa về email đăng ký của bạn
        notify:
          success: true
          failure: true
